
  <div class="todo-panel">
    <h3 id="todo-title">To-do</h3>
    <ul id="todo-list" aria-label="To-do items"></ul>
    <div class="todo-actions">
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="New item" aria-label="New to-do item" />
        <button type="submit" id="todo-add">Add</button>
      </form>
      <button type="button" id="todo-clear-completed">Clear completed</button>
    </div>
  </div>
